name: pr

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🏗️ checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏗️ setup pnpm
        uses: pnpm/action-setup@v3

      - name: 🏗️ setup node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 📦 install dependencies
        run: pnpm install --frozen-lockfile

      - name: 👷 build
        run: pnpm run build

      - name: 🧑‍🔬 test
        run: pnpm run test:coverage

      - name: 💅 lint
        run: pnpm run lint

      - name: 🚚 exports
        run: pnpm run exports

      - name: 🚨 tsc
        run: pnpm run tsc

      - name: ✂️ knip
        run: pnpm run knip
